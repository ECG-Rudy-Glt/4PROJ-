services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_itest
      POSTGRES_DB: supfile_test
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supfile_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supfile-integration

  minio-test:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      MINIO_ROOT_USER: supfileminio
      MINIO_ROOT_PASSWORD: supfileminio123
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supfile-integration

  minio-init-test:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio-test:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: supfileminio
      MINIO_ROOT_PASSWORD: supfileminio123
      MINIO_APP_ACCESS_KEY: supfile_test_key
      MINIO_APP_SECRET_KEY: supfile_test_secret
      S3_BUCKET: supfile-test-uploads
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-test:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb local/$$S3_BUCKET --ignore-existing &&
      mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY || true &&
      printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetBucketLocation\",\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::'$$S3_BUCKET'\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\",\"s3:AbortMultipartUpload\",\"s3:ListMultipartUploadParts\"],\"Resource\":[\"arn:aws:s3:::'$$S3_BUCKET'/*\"]}]}' > /tmp/app-policy.json &&
      mc admin policy remove local app-bucket-policy >/dev/null 2>&1 || true &&
      mc admin policy create local app-bucket-policy /tmp/app-policy.json &&
      mc admin policy attach local app-bucket-policy --user $$MINIO_APP_ACCESS_KEY
      "
    restart: "no"
    networks:
      - supfile-integration

volumes:
  postgres_test_data:
  minio_test_data:

networks:
  supfile-integration:
