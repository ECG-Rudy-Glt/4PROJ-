services:
  postgres-test:
    image: postgres:16-alpine
    container_name: supfile-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_itest
      POSTGRES_DB: supfile_test
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supfile_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - supfile-integration

  minio-test:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: supfile-minio-test
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio_test_data:/data
    networks:
      - supfile-integration

  minio-init-test:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: supfile-minio-init-test
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      BUCKET='supfile-test-uploads' &&
      mc alias set local http://minio-test:9000 minioadmin minioadmin &&
      mc mb local/$$BUCKET --ignore-existing &&
      mc admin user add local supfile_test_key supfile_test_secret || true &&
      printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetBucketLocation\",\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\",\"s3:AbortMultipartUpload\",\"s3:ListMultipartUploadParts\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'/*\"]}]}' > /tmp/app-policy.json &&
      mc admin policy remove local app-bucket-policy >/dev/null 2>&1 || true &&
      mc admin policy create local app-bucket-policy /tmp/app-policy.json &&
      mc admin policy attach local app-bucket-policy --user supfile_test_key &&
      echo 'Bucket MinIO integration prêt.' &&
      exit 0
      "
    restart: "no"
    networks:
      - supfile-integration

volumes:
  postgres_test_data:
  minio_test_data:

networks:
  supfile-integration:
