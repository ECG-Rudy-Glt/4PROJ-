# Template GitLab CI/CD pour 4PROJ- (Multi-container)
# Adapté de : 02-cicd-universal-templates

stages:
  - build
  - push
  - deploy

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  BACKEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/backend:latest
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  FRONTEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/frontend:latest
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ===========================
# STAGE 1 : BUILD
# ===========================
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  timeout: 20 minutes
  script:
    # Build Backend
    - docker build --pull -t $BACKEND_IMAGE -t $BACKEND_IMAGE_LATEST ./backend
    # Build Frontend
    - docker build --pull -t $FRONTEND_IMAGE -t $FRONTEND_IMAGE_LATEST --build-arg VITE_API_URL=https://$PREPROD_DEPLOY_HOST/api ./frontend
  artifacts:
    expire_in: 1 hour
  only:
    - main
    - master

# ===========================
# STAGE 2 : PUSH
# ===========================
push:
  stage: push
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    # Rebuild & Push Backend
    - docker build --pull -t $BACKEND_IMAGE -t $BACKEND_IMAGE_LATEST ./backend
    - docker push $BACKEND_IMAGE
    - docker push $BACKEND_IMAGE_LATEST
    # Rebuild & Push Frontend
    - docker build --pull -t $FRONTEND_IMAGE -t $FRONTEND_IMAGE_LATEST --build-arg VITE_API_URL=https://$PREPROD_DEPLOY_HOST/api ./frontend
    - docker push $FRONTEND_IMAGE
    - docker push $FRONTEND_IMAGE_LATEST
  only:
    - main
    - master

# ===========================
# STAGE 3 : DEPLOY PREPROD
# ====================  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$PREPROD_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$PREPROD_DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - scp docker-compose.yml ${PREPROD_DEPLOY_USER}@${PREPROD_DEPLOY_HOST}:${PREPROD_DEPLOY_PATH}/
    - |
      if [ -n "$PREPROD_ENV_FILE_CONTENT" ]; then
        echo "$PREPROD_ENV_FILE_CONTENT" > .env.tmp
        scp .env.tmp ${PREPROD_DEPLOY_USER}@${PREPROD_DEPLOY_HOST}:${PREPROD_DEPLOY_PATH}/.env
        rm .env.tmp
      fi
    - |
      ssh ${PREPROD_DEPLOY_USER}@${PREPROD_DEPLOY_HOST} << EOF
        cd ${PREPROD_DEPLOY_PATH}
        echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin ${CI_REGISTRY}

        export BACKEND_IMAGE=${BACKEND_IMAGE}
        export FRONTEND_IMAGE=${FRONTEND_IMAGE}

        docker compose pull
        docker compose up -d --wait --remove-orphans
        docker image prune -f
      EOF
  only:
    - main
    - master
  environment:
    name: preprod
    url: https://$PREPROD_DEPLOY_HOST
