services:
  postgres:
    image: postgres:16-alpine
    container_name: supfile-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-supfile_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-supfile_app_dev_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Lié à 127.0.0.1 uniquement : accessible depuis l'hôte (pgAdmin, etc.) mais PAS depuis le réseau
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supfile-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: supfile-backend:dev
    container_name: supfile-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-supfile_app}:${POSTGRES_APP_PASSWORD:-supfile_app_dev_only}@postgres:5432/${POSTGRES_DB:-supfile}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-supfile-uploads}
      S3_ACCESS_KEY_ID: ${MINIO_APP_ACCESS_KEY:-supfile_app_user}
      S3_SECRET_ACCESS_KEY: ${MINIO_APP_SECRET_KEY:-supfile_app_dev_only}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-12345}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_URL: http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}
      API_INTERNAL_URL: http://backend:${BACKEND_PORT:-5001}
      FRONTEND_URL: http://${HOST_IP:-localhost}:${FRONTEND_PORT:-3000}
      PORT: ${BACKEND_PORT:-5001}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@supfile.com}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_MOCK: ${SMTP_MOCK:-false}
      MAIL_LOGO_URL: ${MAIL_LOGO_URL:-}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-http://onlyoffice:80}
      ONLYOFFICE_PUBLIC_URL: http://${HOST_IP:-localhost}:${ONLYOFFICE_PORT:-8080}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-your-secret-key-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      COHERE_MODEL: ${COHERE_MODEL:-command-r-plus}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_BUSINESS_MONTHLY: ${STRIPE_PRICE_BUSINESS_MONTHLY:-}
      STRIPE_PRICE_ENTERPRISE_MONTHLY: ${STRIPE_PRICE_ENTERPRISE_MONTHLY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      BRAIN_API_URL: ${BRAIN_API_URL:-http://brain-api:8001}
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      DEK_WRAP_SECRET: ${DEK_WRAP_SECRET:-}
      VITE_API_URL: http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      brain-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - supfile-network

  minio-permissions:
    image: busybox:stable
    container_name: supfile-minio-permissions
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /data && chmod 750 /data"]
    volumes:
      - minio_data:/data
    restart: "no"
    networks:
      - supfile-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: supfile-minio
    user: "1000:1000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      # API MinIO accessible en dev : http://localhost:9000
      - "127.0.0.1:9000:9000"
      # Console MinIO accessible en dev : http://localhost:9001
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      minio-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - supfile-network

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: supfile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      BUCKET='${S3_BUCKET:-supfile-uploads}' &&
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb local/$$BUCKET --ignore-existing &&
      mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY || true &&
      printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetBucketLocation\",\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\",\"s3:AbortMultipartUpload\",\"s3:ListMultipartUploadParts\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'/*\"]}]}' > /tmp/app-policy.json &&
      mc admin policy remove local app-bucket-policy >/dev/null 2>&1 || true &&
      mc admin policy create local app-bucket-policy /tmp/app-policy.json &&
      mc admin policy attach local app-bucket-policy --user $$MINIO_APP_ACCESS_KEY &&
      echo 'Bucket MinIO prêt.' &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:-supfile_app_user}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:-supfile_app_dev_only}
    restart: "no"
    networks:
      - supfile-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: supfile-frontend:dev
    container_name: supfile-frontend
    environment:
      VITE_API_URL: http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - supfile-network

  onlyoffice:
    image: onlyoffice/documentserver:8.2.2
    container_name: supfile-onlyoffice
    environment:
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_ENABLED=false
      - JWT_HEADER=Authorization
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    ports:
      - "${ONLYOFFICE_PORT:-8080}:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
    restart: unless-stopped
    networks:
      - supfile-network

  ollama:
    image: ollama/ollama:0.5.4
    container_name: supfile-ollama
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 2048M
    restart: unless-stopped
    networks:
      - supfile-network

  brain-api:
    build:
      context: ./brain-api
      dockerfile: Dockerfile
    container_name: supfile-brain
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      CHROMA_PATH: /app/chromadb
    volumes:
      - brain_chromadb:/app/chromadb
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - supfile-network

networks:
  supfile-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  minio_data:
    driver: local
  onlyoffice_data:
    driver: local
  onlyoffice_log:
    driver: local
  ollama_data:
    driver: local
  brain_chromadb:
    driver: local
