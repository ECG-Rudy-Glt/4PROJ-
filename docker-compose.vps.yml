# Override VPS production — utilisé avec :
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Ajoute :
#   - Reverse proxy nginx avec SSL (Let's Encrypt)
#   - BIND_ADDRESS=127.0.0.1 pour ne pas exposer les ports internes
#   - URLs publiques via le domaine supfile.tech
#   - Support du renouvellement ACME (certbot)

services:
  backend:
    environment:
      API_URL: ${PUBLIC_BASE_URL:-https://supfile.tech}
      FRONTEND_URL: ${PUBLIC_BASE_URL:-https://supfile.tech}
      ONLYOFFICE_PUBLIC_URL: ${PUBLIC_BASE_URL:-https://supfile.tech}/onlyoffice
      OAUTH_CALLBACK_BASE: ${PUBLIC_BASE_URL:-https://supfile.tech}

  frontend:
    build:
      args:
        VITE_API_URL: ${PUBLIC_BASE_URL:-https://supfile.tech}

  mobile-expo:
    image: ${MOBILE_EXPO_IMAGE:-supfile-mobile-expo:local}
    container_name: supfile-mobile-expo
    profiles: [mobile]
    environment:
      EXPO_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-https://supfile.tech}/api
      REACT_NATIVE_PACKAGER_HOSTNAME: ${EXPO_PUBLIC_HOST:-supfile.tech}
      EXPO_NO_TELEMETRY: "1"
      CI: "1"
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - supfile-network

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: supfile-vps-proxy
    depends_on:
      - frontend
      - backend
      - onlyoffice
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vps.conf:/etc/nginx/nginx.conf:ro
      - ${SSL_FULLCHAIN_PATH:-/etc/letsencrypt/live/supfile.tech/fullchain.pem}:/etc/ssl/certs/fullchain.pem:ro
      - ${SSL_PRIVKEY_PATH:-/etc/letsencrypt/live/supfile.tech/privkey.pem}:/etc/ssl/certs/privkey.pem:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
    networks:
      - supfile-network
