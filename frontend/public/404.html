<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Page introuvable - SUPFILE</title>
    <meta
      name="description"
      content="La page demandée est introuvable. Retournez à l'accueil SUPFILE ou à votre espace cloud sécurisé."
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f8fafc;
      }
      main { width: min(100%, 640px); text-align: center; }
      .mark {
        width: 68px;
        height: 68px;
        margin: 0 auto 24px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #eef2ff;
        color: #4f46e5;
        font-size: 30px;
        font-weight: 900;
      }
      .eyebrow {
        margin: 0 0 10px;
        color: #4f46e5;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 58px);
        line-height: 1;
        letter-spacing: -0.03em;
      }
      p {
        margin: 18px auto 0;
        max-width: 520px;
        color: #4b5563;
        font-size: 16px;
        line-height: 1.7;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 32px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 800;
      }
      .primary { background: #4f46e5; color: #fff; }
      .secondary { border: 1px solid #d1d5db; color: #374151; background: #fff; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">404</div>
      <p class="eyebrow">SUPFILE</p>
      <h1 data-i18n="title">Page introuvable</h1>
      <p data-i18n="description">
        Cette adresse ne correspond à aucune page publique. Le lien peut avoir expiré,
        avoir été déplacé ou contenir une erreur.
      </p>
      <div class="actions">
        <a class="primary" href="/" data-i18n="home">Retour à l'accueil</a>
        <a class="secondary" href="/login" data-i18n="login">Se connecter</a>
      </div>
    </main>
    <script>
      const messages = {
        fr: {
          seoTitle: 'Page introuvable - SUPFILE',
          seoDescription: "La page demandée est introuvable. Retournez à l'accueil SUPFILE ou à votre espace cloud sécurisé.",
          title: 'Page introuvable',
          description: "Cette adresse ne correspond à aucune page publique. Le lien peut avoir expiré, avoir été déplacé ou contenir une erreur.",
          home: "Retour à l'accueil",
          login: 'Se connecter'
        },
        en: {
          seoTitle: 'Page not found - SUPFILE',
          seoDescription: 'The requested page could not be found. Return to the SUPFILE homepage or to your secure cloud space.',
          title: 'Page not found',
          description: 'This address does not match any public page. The link may have expired, moved, or contain a typo.',
          home: 'Back to homepage',
          login: 'Sign in'
        }
      };

      const lang = navigator.language && navigator.language.toLowerCase().startsWith('en') ? 'en' : 'fr';
      const dictionary = messages[lang];
      document.documentElement.lang = lang;
      document.title = dictionary.seoTitle;
      document.querySelector('meta[name="description"]')?.setAttribute('content', dictionary.seoDescription);
      document.querySelectorAll('[data-i18n]').forEach((element) => {
        const key = element.getAttribute('data-i18n');
        if (key && dictionary[key]) element.textContent = dictionary[key];
      });
    </script>
  </body>
</html>
