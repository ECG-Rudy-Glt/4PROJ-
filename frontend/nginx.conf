server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    # Increase max upload size for videos and large files (5GB)
    client_max_body_size 5G;

    # Increase buffer sizes for large uploads
    client_body_buffer_size 512M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location = / {
        try_files /landing.html =404;
    }

    location = /landing.html {
        return 301 /;
    }

    location = /index.html {
        return 301 /;
    }

    location = /404.html {
        try_files /404.html =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /sw-push.js {
        try_files /sw-push.js =404;
        add_header Cache-Control "no-cache";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|avif|svg|ico|woff2?|ttf|map|txt|xml|json)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ ^/(login|register|forgot-password|reset-password|mfa-verify|auth/callback|dashboard|files(?:/[^/]+)?|favorites|shared|invite/(?:folder|file)/[^/]+|trash|settings|plans|organization-admin|audit|admin|share/[^/]+)/?$ {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /socket.io/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location ^~ /api {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Large file upload settings
        client_max_body_size 5G;
        proxy_request_buffering off;

        # Increase timeouts for large file uploads (30 minutes)
        proxy_connect_timeout 1800;
        proxy_send_timeout 1800;
        proxy_read_timeout 1800;
        send_timeout 1800;
    }
}
