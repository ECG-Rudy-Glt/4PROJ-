services:
  landing:
    image: nginx:1.27-alpine
    container_name: supfile-landing
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-landing.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ${SSL_FULLCHAIN_PATH:-/etc/letsencrypt/live/supfile.tech/fullchain.pem}:/etc/ssl/certs/fullchain.pem:ro
      - ${SSL_PRIVKEY_PATH:-/etc/letsencrypt/live/supfile.tech/privkey.pem}:/etc/ssl/certs/privkey.pem:ro
      - ./certbot:/var/www/certbot:ro
    restart: unless-stopped
