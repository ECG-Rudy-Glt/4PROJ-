events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    map $uri $cache_control {
        ~*\.(svg|png|ico|woff2?)$  "public, max-age=2592000, immutable";
        ~*\.(css|js)$              "public, max-age=604800";
        ~*\.(xml|txt)$             "public, max-age=86400";
        default                    "public, max-age=3600";
    }

    server {
        listen 80;
        server_name supfile.tech www.supfile.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://supfile.tech$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name www.supfile.tech;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;

        return 301 https://supfile.tech$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name supfile.tech;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/share/nginx/html;
        location = / {
            try_files /landing.html =404;
            add_header Cache-Control "public, max-age=3600";
        }

        location / {
            try_files $uri /landing.html;
            add_header Cache-Control $cache_control;
        }

        location = /robots.txt {
            try_files /robots.txt =404;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            try_files /sitemap.xml =404;
            add_header Cache-Control "public, max-age=86400";
        }

        location ~* \.(svg|png|ico|jpg|jpeg|gif|webp|woff2?)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        location ~ /\.(env|git|htaccess) {
            deny all;
            return 404;
        }

        error_page 404 /landing.html;
    }
}
