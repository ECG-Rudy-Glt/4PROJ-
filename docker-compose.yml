services:
  postgres:
    image: postgres:16-alpine
    container_name: supfile-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est requis}
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-supfile_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD est requis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supfile-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-supfile-backend:local}
    container_name: supfile-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-supfile_app}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB:-supfile}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET est requis}
      JWT_MFA_SECRET: ${JWT_MFA_SECRET:?JWT_MFA_SECRET est requis}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_URL: ${API_URL:-http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}}
      API_INTERNAL_URL: http://backend:${BACKEND_PORT:-5001}
      FRONTEND_URL: ${FRONTEND_URL:-http://${HOST_IP:-localhost}:${FRONTEND_PORT:-3000}}
      PORT: ${BACKEND_PORT:-5001}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@supfile.com}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_MOCK: ${SMTP_MOCK:-false}
      MAIL_LOGO_URL: ${MAIL_LOGO_URL:-}

      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-http://onlyoffice:80}
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:-http://${HOST_IP:-localhost}:${ONLYOFFICE_PORT:-8080}}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET est requis}

      OAUTH_CALLBACK_BASE: ${OAUTH_CALLBACK_BASE:-http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-supfile-uploads}

      S3_ACCESS_KEY_ID: ${MINIO_APP_ACCESS_KEY:?MINIO_APP_ACCESS_KEY est requis}
      S3_SECRET_ACCESS_KEY: ${MINIO_APP_SECRET_KEY:?MINIO_APP_SECRET_KEY est requis}

      BRAIN_API_URL: http://brain-api:8001

      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:?MFA_ENCRYPTION_KEY est requis}

      DEK_WRAP_SECRET: ${DEK_WRAP_SECRET:?DEK_WRAP_SECRET est requis}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY:?FILE_ENCRYPTION_KEY est requis}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_BUSINESS_MONTHLY: ${STRIPE_PRICE_BUSINESS_MONTHLY:-}
      STRIPE_PRICE_ENTERPRISE_MONTHLY: ${STRIPE_PRICE_ENTERPRISE_MONTHLY:-}

      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    user: root
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BIND_ADDRESS:-}${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - supfile-network

  frontend:
    image: ${FRONTEND_IMAGE:-supfile-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://${HOST_IP:-localhost}:${BACKEND_PORT:-5001}}
    container_name: supfile-frontend
    ports:
      - "${BIND_ADDRESS:-}${FRONTEND_PORT:-3000}:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - supfile-network

  onlyoffice:
    image: onlyoffice/documentserver:8.2.2
    container_name: supfile-onlyoffice
    environment:
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET est requis}
      - JWT_ENABLED=true
      - JWT_HEADER=Authorization
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    ports:
      - "${BIND_ADDRESS:-}${ONLYOFFICE_PORT:-8080}:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
    restart: unless-stopped
    networks:
      - supfile-network

  minio-permissions:
    image: busybox:stable
    container_name: supfile-minio-permissions
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /data && chmod 750 /data"]
    volumes:
      - minio_data:/data
    restart: "no"
    networks:
      - supfile-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: supfile-minio
    user: "1000:1000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER est requis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD est requis}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      minio-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - supfile-network

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: supfile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      BUCKET='${S3_BUCKET:-supfile-uploads}' &&
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb local/$$BUCKET --ignore-existing &&
      mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY || true &&
      printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetBucketLocation\",\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\",\"s3:AbortMultipartUpload\",\"s3:ListMultipartUploadParts\"],\"Resource\":[\"arn:aws:s3:::'$$BUCKET'/*\"]}]}' > /tmp/app-policy.json &&
      mc admin policy remove local app-bucket-policy >/dev/null 2>&1 || true &&
      mc admin policy create local app-bucket-policy /tmp/app-policy.json &&
      mc admin policy attach local app-bucket-policy --user $$MINIO_APP_ACCESS_KEY &&
      echo 'Bucket MinIO pret.' &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY}
    restart: "no"
    networks:
      - supfile-network

  ollama:
    image: ollama/ollama:latest
    container_name: supfile-ollama
    profiles: [ai]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 2048M
    restart: unless-stopped
    networks:
      - supfile-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: supfile-ollama-init
    profiles: [ai]
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      until ollama list > /dev/null 2>&1; do sleep 2; done &&
      ollama pull ${OLLAMA_MODEL:-gemma2:2b} &&
      echo 'Model ready.'
      "
    depends_on:
      - ollama
    restart: "no"
    networks:
      - supfile-network

  brain-api:
    build: ./brain-api
    container_name: supfile-brain
    profiles: [ai]
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      CHROMA_PATH: /app/chromadb
    volumes:
      - brain_chromadb:/app/chromadb
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - supfile-network

networks:
  supfile-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  minio_data:
    driver: local
  onlyoffice_data:
    driver: local
  onlyoffice_log:
    driver: local
  ollama_data:
    driver: local
  brain_chromadb:
    driver: local


