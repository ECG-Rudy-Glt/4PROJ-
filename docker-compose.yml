version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: supfile-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supfile-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supfile-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-supfile}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-12345}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_URL: ${API_URL:-http://localhost:5001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: ${BACKEND_PORT:-5001}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
      # Optional OAuth2 credentials (leave empty if not configured)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - supfile-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:-http://localhost:5001}
    container_name: supfile-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - supfile-network

networks:
  supfile-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
