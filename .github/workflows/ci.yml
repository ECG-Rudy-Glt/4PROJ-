name: CI Pipeline

# Déclenchement sur push et PR vers les branches principales
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


permissions:
  contents: read

jobs:

  # 1 VALIDATION PRÉ-REQUIS
  # Vérifie que les secrets nécessaires au pipeline sont bien configurés
  # dans GitHub Actions avant de lancer les jobs coûteux.

  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Checking required CI environment variables..."
          : "${JWT_SECRET:?JWT_SECRET secret is not set in GitHub Actions}"
          : "${JWT_MFA_SECRET:?JWT_MFA_SECRET secret is not set in GitHub Actions}"
          : "${FILE_ENCRYPTION_KEY:?FILE_ENCRYPTION_KEY secret is not set in GitHub Actions}"
          : "${DEK_WRAP_SECRET:?DEK_WRAP_SECRET secret is not set in GitHub Actions}"
          : "${MFA_ENCRYPTION_KEY:?MFA_ENCRYPTION_KEY secret is not set in GitHub Actions}"
          : "${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET secret is not set in GitHub Actions}"
          echo "Optional secrets present: DATABASE_URL=${DATABASE_URL:+set}"
          echo "All required environment variables are set."
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_MFA_SECRET: ${{ secrets.JWT_MFA_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}
          DEK_WRAP_SECRET: ${{ secrets.DEK_WRAP_SECRET }}
          MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
          ONLYOFFICE_JWT_SECRET: ${{ secrets.ONLYOFFICE_JWT_SECRET }}

  # 2a QUALITÉ BACKEND
  # Installe les dépendances, génère le client Prisma, compile TypeScript,
  # exécute les tests unitaires avec couverture et audite les dépendances npm.
  
  backend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_MFA_SECRET: ${{ secrets.JWT_MFA_SECRET }}
      JWT_EXPIRES_IN: '7d'
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}
      DEK_WRAP_SECRET: ${{ secrets.DEK_WRAP_SECRET }}
      MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
      ONLYOFFICE_JWT_SECRET: ${{ secrets.ONLYOFFICE_JWT_SECRET }}
      PORT: '5001'
      FRONTEND_URL: 'http://localhost:3000'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ./backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('./backend/package.json') }}
          restore-keys: ${{ runner.os }}-backend-

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify Types and Build
        run: npm run build

      - name: Run Backend Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Audit Dependencies
        run: npm audit --audit-level=high

  # 2b QUALITÉ FRONTEND
  # Installe les dépendances, vérifie le linting ESLint, compile le bundle Vite,
  # audite les dépendances npm et exécute les tests E2E Cypress sur le preview.
  
  frontend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:5001' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ./frontend/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Install Dependencies
        run: npm install

      - name: Verify Linting
        run: npm run lint

      - name: Verify Types and Build
        run: npm run build

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: frontend
          install: false
          start: npm run preview
          wait-on: 'http://localhost:4173'

  # 2c SAST ANALYSE STATIQUE DE SÉCURITÉ (Semgrep)
  # Analyse le code source à la recherche de vulnérabilités connues
  # via les règles communautaires Semgrep (défaut, Node.js, React).
  # Bloque le pipeline sur toute finding de niveau ERROR.
  
  semgrep:
    needs: validate-env
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/nodejs" \
            --config "p/react" \
            --error \
            --severity ERROR \
            .

  # [2d] DÉTECTION DE SECRETS (TruffleHog)
  # Scanne tout l'historique git à la recherche de secrets (clés API, tokens,
  # mots de passe) qui auraient été commités. Seuls les secrets vérifiés
  # (actifs et confirmés) bloquent le pipeline (--only-verified).
  trufflehog:
    needs: validate-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Historique complet requis pour scanner tous les commits

      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan secrets with TruffleHog
        run: trufflehog git file://. --only-verified --fail

  # [3] BUILD & SÉCURITÉ IMAGES DOCKER
  # Construit les images backend et frontend, puis enchaîne deux niveaux
  # de contrôle de sécurité :
  #   - Dockle  : audit de configuration Dockerfile (CIS Docker Benchmark)
  #   - SBOM    : génération du Software Bill of Materials (format SPDX-JSON)
  #               conservé 90 jours comme artifact CI pour traçabilité supply chain
  
  docker-build:
    needs: [ backend-checks, frontend-checks, semgrep, trufflehog ]
    runs-on: ubuntu-latest
    env:
      DOCKLE_VERSION: "0.4.15"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          load: true
          tags: backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          load: true
          tags: frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Dockle audit configuration Dockerfile 
      - name: Install Dockle
        run: |
          curl -fsSL \
            -o /tmp/dockle.tar.gz \
            "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/dockle.tar.gz -C /tmp dockle
          sudo install -m 0755 /tmp/dockle /usr/local/bin/dockle
          dockle --version

      - name: Scan Backend Image with Dockle
        run: dockle --exit-code 1 --exit-level fatal backend:ci
        continue-on-error: true

      - name: Scan Frontend Image with Dockle
        # CIS-DI-0010 ignoré : KEY_SHA512 vient du build de l'image nginx-unprivileged
        # (vérification de la signature nginx) faux positif confirmé
        run: dockle --exit-code 1 --exit-level fatal --ignore CIS-DI-0010 frontend:ci
        continue-on-error: true

      # SBOM : traçabilité supply chain
      - name: Generate SBOM - Backend
        uses: anchore/sbom-action@v0
        with:
          image: backend:ci
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Generate SBOM - Frontend
        uses: anchore/sbom-action@v0
        with:
          image: frontend:ci
          format: spdx-json
          output-file: sbom-frontend.spdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.spdx.json
          retention-days: 90

  # 4 PUSH GHCR
  # Pousse les images buildées vers le GitHub Container Registry avec deux tags 
  docker-push:
    needs: [ docker-build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # Requis pour pousser sur GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set image name
        # Normalise le nom du dépôt en minuscules et supprime les tirets en fin de segment
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/-*\//\//g; s/-*$//')" >> $GITHUB_ENV

      - name: Check production image configuration
        run: |
          : "${PROD_DEPLOY_HOST:?PROD_DEPLOY_HOST variable is not set}"
          case "$PROD_DEPLOY_HOST" in
            http://*|https://*)
              echo "PROD_DEPLOY_HOST must be a host name only, without http:// or https://"
              exit 1
              ;;
          esac
        env:
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
          build-args: VITE_API_URL=https://${{ vars.PROD_DEPLOY_HOST }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────────────────────────────
  # [5] DÉPLOIEMENT PRODUCTION
  # Copie les fichiers de configuration sur le VPS via SSH, puis lance
  # docker compose pull + up pour déployer les nouvelles images GHCR.
  # Exécuté uniquement sur push vers main.
  # ─────────────────────────────────────────────────────────────────────
  deploy-prod:
    needs: [ docker-push ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ vars.PROD_DEPLOY_HOST }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set image name
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/-*\//\//g; s/-*$//')" >> $GITHUB_ENV

      - name: Check deploy configuration
        run: |
          : "${PROD_DEPLOY_HOST:?PROD_DEPLOY_HOST variable is not set}"
          : "${PROD_DEPLOY_USER:?PROD_DEPLOY_USER variable is not set}"
          : "${PROD_DEPLOY_PATH:?PROD_DEPLOY_PATH variable is not set}"
          : "${PROD_SSH_PRIVATE_KEY:?PROD_SSH_PRIVATE_KEY secret is not set}"
          : "${GHCR_PAT:?GHCR_PAT secret is not set}"
          : "${PROD_ENV_FILE_CONTENT:?PROD_ENV_FILE_CONTENT secret is not set}"

          case "$PROD_DEPLOY_HOST" in
            http://*|https://*)
              echo "PROD_DEPLOY_HOST must be a host name only, without http:// or https://"
              exit 1
              ;;
          esac

          case "$PROD_DEPLOY_PATH" in
            /*) ;;
            *)
              echo "PROD_DEPLOY_PATH must be an absolute path, for example /opt/supfile"
              exit 1
              ;;
          esac
        env:
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          PROD_ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE_CONTENT }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$PROD_DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Ensure deploy path exists and is writable
        run: |
          ssh "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" \
            "sudo mkdir -p '${PROD_DEPLOY_PATH}/postgres/init' && sudo chown -R '${PROD_DEPLOY_USER}:${PROD_DEPLOY_USER}' '${PROD_DEPLOY_PATH}'"
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}

      - name: Copy compose and nginx config to VPS
        run: |
          scp docker-compose.yml \
              docker-compose.vps.yml \
              frontend/nginx.vps.conf \
              "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}:${PROD_DEPLOY_PATH}/"
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}

      - name: Copy postgres init scripts
        run: |
          scp -r postgres/init/* \
              "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}:${PROD_DEPLOY_PATH}/postgres/init/"
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}

      - name: Copy backup/restore scripts
        run: |
          scp scripts/backup-vps.sh scripts/restore-vps.sh \
              "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}:${PROD_DEPLOY_PATH}/"
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}

      - name: Deploy .env
        run: |
          umask 077
          trap 'rm -f .env.tmp' EXIT
          printf '%s\n' "$PROD_ENV_FILE_CONTENT" > .env.tmp
          scp .env.tmp "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}:${PROD_DEPLOY_PATH}/.env"
          ssh "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" "chmod 600 '${PROD_DEPLOY_PATH}/.env'"
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
          PROD_ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE_CONTENT }}

      - name: Deploy on VPS
        run: |
          BACKEND_IMAGE="ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}"
          FRONTEND_IMAGE="ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}"
          GHCR_TOKEN="${{ secrets.GHCR_PAT }}"
          ACTOR="${{ github.actor }}"
          DEPLOY_PATH="${{ vars.PROD_DEPLOY_PATH }}"

          ssh "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" bash <<EOF
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:\$PATH"
            cd ${DEPLOY_PATH}
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

            export BACKEND_IMAGE=${BACKEND_IMAGE}
            export FRONTEND_IMAGE=${FRONTEND_IMAGE}
            export BIND_ADDRESS=127.0.0.1:

            docker compose -f docker-compose.yml -f docker-compose.vps.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --no-build --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --no-build --force-recreate reverse-proxy
            docker compose -f docker-compose.yml -f docker-compose.vps.yml ps
            docker image prune -a -f --filter "until=168h"
          EOF
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 20

          check_url() {
            local label="$1"
            local url="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "${label} is healthy (HTTP ${status})"
              return 0
            fi
            echo "${label} health check failed: HTTP ${status} (${url})"
            return 1
          }

          FAILED=0
          check_url "Frontend" "https://${PROD_DEPLOY_HOST}/" || FAILED=1
          check_url "Backend" "https://${PROD_DEPLOY_HOST}/health" || FAILED=1
          exit "$FAILED"
        env:
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}

      - name: Dump VPS diagnostics on failure
        if: failure()
        run: |
          ssh "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" "
            cd '${PROD_DEPLOY_PATH}' &&
            docker compose -f docker-compose.yml -f docker-compose.vps.yml ps &&
            docker compose -f docker-compose.yml -f docker-compose.vps.yml logs --tail=200 reverse-proxy backend frontend
          "
        env:
          PROD_DEPLOY_USER: ${{ vars.PROD_DEPLOY_USER }}
          PROD_DEPLOY_HOST: ${{ vars.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
