name: CI Pipeline

on:
  push:
    branches: [ main, claude-proto, ci_deploy_vps ]
  pull_request:
    branches: [ main, claude-proto, ci_deploy_vps ]

# Permissions par défaut pour tous les jobs (principe de moindre privilège)
# docker-push surcharge avec packages: write pour pusher sur GHCR
permissions:
  contents: read

jobs:
  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Checking required CI environment variables..."
          : "${JWT_SECRET:?JWT_SECRET secret is not set in GitHub Actions}"
          : "${FILE_ENCRYPTION_KEY:?FILE_ENCRYPTION_KEY secret is not set in GitHub Actions}"
          echo "Optional secrets present: DATABASE_URL=${DATABASE_URL:+set}"
          echo "All required environment variables are set."
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}

  backend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: '7d'
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}
      MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
      PORT: '5001'
      FRONTEND_URL: 'http://localhost:3000'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('./backend/package.json') }}
          restore-keys: ${{ runner.os }}-backend-

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify Types and Build
        run: npm run build

      - name: Run Backend Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Audit Dependencies
        run: npm audit --audit-level=high

  frontend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:5001' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ./frontend/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Install Dependencies
        run: npm install

      - name: Verify Linting
        run: npm run lint

      - name: Verify Types and Build
        run: npm run build

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run preview
          wait-on: 'http://localhost:4173'

  docker-build:
    needs: [ backend-checks, frontend-checks ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'backend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'frontend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ===========================
  # PUSH TO GHCR (main + ci_deploy_vps)
  # ===========================
  docker-push:
    needs: [ docker-build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci_deploy_vps')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image name
        # Lowercase le repo + supprime les tirets en fin de segment de chemin
        # ex: ECG-Rudy-Glt/4PROJ- → ecg-rudy-glt/4proj
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/-*\//\//g; s/-*$//')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
          build-args: VITE_API_URL=https://${{ vars.PREPROD_DEPLOY_HOST }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ===========================
  # DEPLOY PREPROD (main + ci_deploy_vps)
  # ===========================
  deploy-preprod:
    needs: [ docker-push ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci_deploy_vps')
    environment:
      name: preprod
      url: https://${{ vars.PREPROD_DEPLOY_HOST }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/-*\//\//g; s/-*$//')" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PREPROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.PREPROD_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure deploy path exists on VPS
        run: |
          ssh ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }} \
            mkdir -p ${{ vars.PREPROD_DEPLOY_PATH }}

      - name: Copy files to VPS
        run: |
          scp docker-compose.yml ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/
          scp docker-compose.vps.yml ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/
          scp frontend/nginx.vps.conf ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/

      - name: Copy .env to VPS
        run: |
          if [ -n "$PREPROD_ENV_FILE_CONTENT" ]; then
            echo "${PREPROD_ENV_FILE_CONTENT}" > .env.tmp
            scp .env.tmp ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/.env
            rm .env.tmp
          fi
        env:
          PREPROD_ENV_FILE_CONTENT: ${{ secrets.PREPROD_ENV_FILE_CONTENT }}

      - name: Deploy on VPS
        run: |
          BACKEND_IMAGE="ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}"
          FRONTEND_IMAGE="ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}"
          GHCR_TOKEN="${{ secrets.GHCR_PAT }}"
          ACTOR="${{ github.actor }}"
          DEPLOY_PATH="${{ vars.PREPROD_DEPLOY_PATH }}"

          ssh ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }} bash << EOF
            export PATH="/usr/local/bin:/usr/bin:/bin:\$PATH"
            cd ${DEPLOY_PATH}
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

            export BACKEND_IMAGE=${BACKEND_IMAGE}
            export FRONTEND_IMAGE=${FRONTEND_IMAGE}

            docker compose -f docker-compose.yml -f docker-compose.vps.yml pull
            docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --wait --wait-timeout 120 --remove-orphans
            docker image prune -a -f --filter "until=168h"
          EOF
