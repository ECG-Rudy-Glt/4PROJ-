name: CI Pipeline

on:
  push:
    branches: [ main, claude-proto, ci_deploy_vps ]
  pull_request:
    branches: [ main, claude-proto, ci_deploy_vps ]

jobs:
  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Checking required CI environment variables..."
          : "${JWT_SECRET:?JWT_SECRET secret is not set in GitHub Actions}"
          : "${FILE_ENCRYPTION_KEY:?FILE_ENCRYPTION_KEY secret is not set in GitHub Actions}"
          echo "Optional secrets present: DATABASE_URL=${DATABASE_URL:+set}"
          echo "All required environment variables are set."
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}

  backend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: '7d'
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}
      MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
      PORT: '5001'
      FRONTEND_URL: 'http://localhost:3000'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Verify Types and Build
        run: npm run build

      - name: Run Backend Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Audit Dependencies
        run: npm audit --audit-level=high

  frontend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:5001' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Verify Linting
        run: npm run lint

      - name: Verify Types and Build
        run: npm run build

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          build: npm run build
          start: npm run preview
          wait-on: 'http://localhost:4173'

  docker-build:
    needs: [ backend-checks, frontend-checks ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t backend:ci ./backend

      - name: Build Frontend Docker Image
        run: docker build -t frontend:ci ./frontend

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ===========================
  # PUSH TO GHCR (main only)
  # ===========================
  docker-push:
    needs: [ docker-build ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${REPO_LOWER}/backend:${{ github.sha }} \
                       -t ghcr.io/${REPO_LOWER}/backend:latest \
                       ./backend
          docker push ghcr.io/${REPO_LOWER}/backend:${{ github.sha }}
          docker push ghcr.io/${REPO_LOWER}/backend:latest

      - name: Build and Push Frontend
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${REPO_LOWER}/frontend:${{ github.sha }} \
                       -t ghcr.io/${REPO_LOWER}/frontend:latest \
                       --build-arg VITE_API_URL=https://${{ vars.PREPROD_DEPLOY_HOST }}/api \
                       ./frontend
          docker push ghcr.io/${REPO_LOWER}/frontend:${{ github.sha }}
          docker push ghcr.io/${REPO_LOWER}/frontend:latest

  # ===========================
  # DEPLOY PREPROD (main only)
  # ===========================
  deploy-preprod:
    needs: [ docker-push ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: preprod
      url: https://${{ vars.PREPROD_DEPLOY_HOST }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PREPROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.PREPROD_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy docker-compose to VPS
        run: |
          scp docker-compose.yml ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/

      - name: Copy .env to VPS
        run: |
          if [ -n "$PREPROD_ENV_FILE_CONTENT" ]; then
            echo "${PREPROD_ENV_FILE_CONTENT}" > .env.tmp
            scp .env.tmp ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }}:${{ vars.PREPROD_DEPLOY_PATH }}/.env
            rm .env.tmp
          fi
        env:
          PREPROD_ENV_FILE_CONTENT: ${{ secrets.PREPROD_ENV_FILE_CONTENT }}

      - name: Deploy on VPS
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BACKEND_IMAGE="ghcr.io/${REPO_LOWER}/backend:${{ github.sha }}"
          FRONTEND_IMAGE="ghcr.io/${REPO_LOWER}/frontend:${{ github.sha }}"
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          ACTOR="${{ github.actor }}"
          DEPLOY_PATH="${{ vars.PREPROD_DEPLOY_PATH }}"

          ssh ${{ vars.PREPROD_DEPLOY_USER }}@${{ vars.PREPROD_DEPLOY_HOST }} bash << EOF
            cd ${DEPLOY_PATH}
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

            export BACKEND_IMAGE=${BACKEND_IMAGE}
            export FRONTEND_IMAGE=${FRONTEND_IMAGE}

            docker compose pull
            docker compose up -d --wait --remove-orphans
            docker image prune -f
          EOF

