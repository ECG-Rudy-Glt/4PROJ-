name: CI Pipeline

# Déclenchement sur push et PR vers les branches principales
on:
  push:
    branches: [ main, claude-proto, scanning_code ]
  pull_request:
    branches: [ main, claude-proto, scanning_code ]

# Permissions globales : lecture seule par défaut (principe de moindre privilège)
# Les jobs qui ont besoin de plus de droits les déclarent localement (ex: docker-push)
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Ordre d'exécution :
#
#  [1] validate-env          → Vérifie que les secrets requis sont configurés
#       │
#       ├─ [2a] backend-checks   ┐
#       ├─ [2b] frontend-checks  ├─ Qualité & tests (parallèle)
#       ├─ [2c] semgrep          ┤  Sécurité code source (SAST)
#       └─ [2d] trufflehog       ┘  Détection de secrets dans l'historique git
#            │
#           [3] docker-build  → Build images + config (Dockle) + SBOM
#            │
#           [4] docker-push   → Push GHCR (main uniquement)
#            │
#           [5] deploy-preprod → Déploiement VPS via SSH (main uniquement)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ===========================
  # [1] VALIDATION PRÉ-REQUIS
  # Vérifie que les secrets nécessaires au pipeline sont bien configurés
  # dans GitHub Actions avant de lancer les jobs coûteux.
  # ===========================
  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Checking required CI environment variables..."
          : "${JWT_SECRET:?JWT_SECRET secret is not set in GitHub Actions}"
          : "${FILE_ENCRYPTION_KEY:?FILE_ENCRYPTION_KEY secret is not set in GitHub Actions}"
          echo "Optional secrets present: DATABASE_URL=${DATABASE_URL:+set}"
          echo "All required environment variables are set."
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}

  # ===========================
  # [2a] QUALITÉ BACKEND
  # Installe les dépendances, génère le client Prisma, compile TypeScript,
  # exécute les tests unitaires avec couverture et audite les dépendances npm.
  # ===========================
  backend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: '7d'
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      FILE_ENCRYPTION_KEY: ${{ secrets.FILE_ENCRYPTION_KEY }}
      MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
      PORT: '5001'
      FRONTEND_URL: 'http://localhost:3000'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('./backend/package.json') }}
          restore-keys: ${{ runner.os }}-backend-

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify Types and Build
        run: npm run build

      - name: Run Backend Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Audit Dependencies
        run: npm audit --audit-level=high

  # ===========================
  # [2b] QUALITÉ FRONTEND
  # Installe les dépendances, vérifie le linting ESLint, compile le bundle Vite,
  # audite les dépendances npm et exécute les tests E2E Cypress sur le preview.
  # ===========================
  frontend-checks:
    needs: validate-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:5001' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ./frontend/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Install Dependencies
        run: npm install

      - name: Verify Linting
        run: npm run lint

      - name: Verify Types and Build
        run: npm run build

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run preview
          wait-on: 'http://localhost:4173'

  # ===========================
  # [2c] SAST — ANALYSE STATIQUE DE SÉCURITÉ (Semgrep)
  # Analyse le code source à la recherche de vulnérabilités connues
  # via les règles communautaires Semgrep (défaut, Node.js, React).
  # Bloque le pipeline sur toute finding de niveau ERROR.
  # ===========================
  semgrep:
    needs: validate-env
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/nodejs" \
            --config "p/react" \
            --error \
            --severity ERROR \
            .

  # ===========================
  # [2d] DÉTECTION DE SECRETS (TruffleHog)
  # Scanne tout l'historique git à la recherche de secrets (clés API, tokens,
  # mots de passe) qui auraient été commités. Seuls les secrets vérifiés
  # (actifs et confirmés) bloquent le pipeline (--only-verified).
  # ===========================
  trufflehog:
    needs: validate-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historique complet requis pour scanner tous les commits

      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan secrets with TruffleHog
        # Mode CLI direct : évite que l'action wrapper tente de résoudre 'main'
        # comme ref de base (comportement par défaut de l'action en contexte GitHub).
        # Scanne tout l'historique git avec --only-verified pour ne bloquer
        # que sur des secrets actifs et confirmés.
        run: trufflehog git file://. --only-verified --fail

  # ===========================
  # [3] BUILD & SÉCURITÉ IMAGES DOCKER
  # Construit les images backend et frontend, puis enchaîne deux niveaux
  # de contrôle de sécurité :
  #   - Dockle  : audit de configuration Dockerfile (CIS Docker Benchmark)
  #   - SBOM    : génération du Software Bill of Materials (format SPDX-JSON)
  #               conservé 90 jours comme artifact CI pour traçabilité supply chain
  # ===========================
  docker-build:
    needs: [ backend-checks, frontend-checks, semgrep, trufflehog ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # — Dockle : audit configuration Dockerfile ——————————————————————————
      - name: Install Dockle
        run: |
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sL "https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz" \
            | tar xz
          sudo mv dockle /usr/local/bin/

      - name: Scan Backend Image with Dockle
        run: dockle --exit-code 1 --exit-level fatal backend:ci
        continue-on-error: true

      - name: Scan Frontend Image with Dockle
        # CIS-DI-0010 ignoré : KEY_SHA512 vient du build de l'image nginx-unprivileged
        # (vérification de la signature nginx) — faux positif confirmé
        run: dockle --exit-code 1 --exit-level fatal --ignore CIS-DI-0010 frontend:ci
        continue-on-error: true

      # — SBOM : traçabilité supply chain ——————————————————————————————————
      - name: Generate SBOM - Backend
        uses: anchore/sbom-action@v0
        with:
          image: backend:ci
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Generate SBOM - Frontend
        uses: anchore/sbom-action@v0
        with:
          image: frontend:ci
          format: spdx-json
          output-file: sbom-frontend.spdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.spdx.json
          retention-days: 90

  # ===========================
  # [4] PUSH GHCR
  # Pousse les images buildées vers le GitHub Container Registry avec deux tags :
  #   - :latest          → dernière version stable
  #   - :<git-sha>       → version immuable liée au commit exact
  # Exécuté uniquement sur push vers main.
  # ===========================
  docker-push:
    needs: [ docker-build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # Requis pour pousser sur GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image name
        # Normalise le nom du dépôt en minuscules et supprime les tirets en fin de segment
        # ex: ECG-Rudy-Glt/4PROJ- → ecg-rudy-glt/4proj
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/-*\//\//g; s/-*$//')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
          build-args: VITE_API_URL=https://${{ vars.PREPROD_DEPLOY_HOST }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ===========================
  # [5] DÉPLOIEMENT PRÉPROD
  # Copie les fichiers de configuration (docker-compose, nginx, .env) sur le VPS
  # via SSH, puis lance un docker compose pull + up pour déployer les nouvelles
  # images depuis GHCR. Nettoie les images âgées de plus de 7 jours.
  # Exécuté uniquement sur push vers main.
